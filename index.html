<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Manager System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* รูปแบบเฉพาะสำหรับการพิมพ์ (Print) */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0; top: 0;
                width: 210mm; /* A4 Width */
                display: grid;
                grid-template-columns: 1fr 1fr; /* แบ่ง 2 คอลัมน์ */
                grid-template-rows: repeat(5, 1fr); /* แบ่ง 5 แถว = 10 Tag ต่อหน้า */
                gap: 5mm;
                padding: 5mm;
                box-sizing: border-box;
            }
            .no-print { display: none !important; }
            
            /* กำหนดเส้นขอบของ Tag ตอนพิมพ์ให้ชัดเจน */
            .tag-table { width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 10px; border: 2px solid black; }
            .tag-table td { border: 1px solid black; padding: 4px; }
            .bg-gray-200 { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; }
        }

        /* รูปแบบ Tag สำหรับหน้าจอ Preview */
        .tag-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tag-table td { border: 1px solid #000; padding: 6px; }
    </style>
</head>
<body class="bg-gray-100 p-6">

    <div id="main-view" class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4"><i class="fa-solid fa-tags text-blue-600"></i> TAG MANAGER SYSTEM</h1>
        
        <div class="relative mb-6">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
            </div>
            <input type="text" id="searchInput" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5" placeholder="ค้นหาที่นี่ พิมพ์ชื่อ Model / Part name / Part no." onkeyup="filterTable()">
        </div>

        <div id="loading" class="text-center py-4 text-gray-500"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูลจากฐานข้อมูล...</div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left text-gray-500" id="dataTable" style="display: none;">
                <thead class="text-xs text-gray-700 uppercase bg-gray-200">
                    <tr>
                        <th class="px-6 py-3">No.</th>
                        <th class="px-6 py-3">Model</th>
                        <th class="px-6 py-3">Part name</th>
                        <th class="px-6 py-3">Part no.</th>
                        <th class="px-6 py-3">Pcs/Box</th>
                        <th class="px-6 py-3">Customer</th>
                        <th class="px-6 py-3 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="preview-view" class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md hidden no-print">
        <div class="flex justify-between items-center mb-4 bg-gray-100 p-4 rounded">
            <div class="flex items-center gap-4">
                <label class="font-bold">ตั้งค่าวันที่:</label>
                <input type="date" id="printDate" class="border p-1 rounded" value="">
                <button onclick="updatePreviewDate()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">อัปเดตวันที่</button>
            </div>
            <div class="flex gap-2">
                <button onclick="window.print()" class="bg-blue-800 text-white px-4 py-2 rounded shadow hover:bg-blue-900"><i class="fa-solid fa-print"></i> พิมพ์ (Ctrl+P)</button>
                <button onclick="window.print()" class="bg-red-600 text-white px-4 py-2 rounded shadow hover:bg-red-700"><i class="fa-solid fa-file-pdf"></i> บันทึก PDF</button>
                <button onclick="closePreview()" class="bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600"><i class="fa-solid fa-xmark"></i> ปิด</button>
            </div>
        </div>
        <div class="text-center text-sm text-gray-500 mb-4">ⓘ ระบบจำลองการพิมพ์: กระดาษ A4 1 หน้า จะมี 10 Tags พอดี</div>
        
        <div id="print-area" class="w-full">
            </div>
    </div>

    <script>
        // *** นำ URL ของ Web App จาก Google Apps Script มาใส่ตรงนี้ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqCKW-BQhoqusizjbi40-QeNq8mogyh4ynT7O6WqQtSUa7TSOpUP95OKGKUCty0S6Udw/exec"; 
        
        let dbData = [];
        let currentPrintItem = null;

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = async () => {
            document.getElementById('printDate').valueAsDate = new Date(); // Default วันนี้
            
            try {
                const response = await fetch(SCRIPT_URL);
                dbData = await response.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                renderTable(dbData);
            } catch (error) {
                document.getElementById('loading').innerHTML = "<span class='text-red-500'>เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาตรวจสอบ URL หรือสิทธิ์การเข้าถึง Web App</span>";
            }
        };

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="px-6 py-4">${index + 1}</td>
                    <td class="px-6 py-4 font-medium text-gray-900">${item['Model'] || '-'}</td>
                    <td class="px-6 py-4">${item['Part name'] || '-'}</td>
                    <td class="px-6 py-4">${item['Part no'] || '-'}</td>
                    <td class="px-6 py-4">${item['Qty pcs'] || '-'}</td>
                    <td class="px-6 py-4">${item['Customer'] || '-'}</td>
                    <td class="px-6 py-4 flex gap-2 justify-center">
                        <button onclick='openPreview(${JSON.stringify(item)})' class="text-blue-500 hover:text-blue-700" title="Preview / Print"><i class="fa-solid fa-print text-lg"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = dbData.filter(item => {
                return (item['Model'] && item['Model'].toString().toLowerCase().includes(query)) ||
                       (item['Part name'] && item['Part name'].toString().toLowerCase().includes(query)) ||
                       (item['Part no'] && item['Part no'].toString().toLowerCase().includes(query));
            });
            renderTable(filtered);
        }

        // สร้าง HTML สำหรับ Tag 1 ใบ
        function createTagHTML(item, dateStr) {
            return `
                <table class="tag-table">
                    <tr>
                        <td class="font-bold w-1/4">CUSTOMER</td>
                        <td class="text-center font-bold text-lg" colspan="3">${item['Customer'] || ''}</td>
                    </tr>
                    <tr>
                        <td class="font-bold">MODEL</td>
                        <td class="text-center font-bold">${item['Model'] || ''}</td>
                        <td class="font-bold text-center w-1/6">DATE</td>
                        <td class="text-center w-1/4">${dateStr}</td>
                    </tr>
                    <tr>
                        <td class="font-bold text-xs">PART NAME</td>
                        <td class="text-center font-bold text-sm" colspan="3">${item['Part name'] || ''}</td>
                    </tr>
                    <tr>
                        <td class="font-bold text-xs">PART NUMBER</td>
                        <td class="text-center font-bold text-sm" colspan="3">${item['Part no'] || ''}</td>
                    </tr>
                    <tr>
                        <td class="font-bold">QUANTITY</td>
                        <td class="text-center"><span class="font-bold text-lg">${item['Qty pcs'] || ''}</span> Pcs.</td>
                        <td class="text-center align-middle" colspan="2" rowspan="2">
                            ${item['Photo base64'] ? `<img src="${item['Photo base64']}" class="max-h-12 mx-auto object-contain">` : ''}
                        </td>
                    </tr>
                    <tr>
                        <td class="font-bold">OPERATOR</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td class="font-bold text-xs" colspan="4">THAI CUBIC TECHNOLOGY CO.,LTD.</td>
                    </tr>
                </table>
            `;
        }

        function openPreview(item) {
            currentPrintItem = item;
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('preview-view').classList.remove('hidden');
            generateTagsForPrint();
        }

        function updatePreviewDate() {
            generateTagsForPrint();
        }

        function generateTagsForPrint() {
            if (!currentPrintItem) return;
            
            // จัดการ Format วันที่ (DD/MM/YYYY)
            const dateInput = document.getElementById('printDate').value;
            let dateStr = "";
            if(dateInput) {
                const d = new Date(dateInput);
                dateStr = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
            }

            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';
            
            // จำลองการสร้าง 10 Tags (สำหรับ 1 หน้า A4)
            for(let i=0; i<10; i++) {
                const tagWrapper = document.createElement('div');
                tagWrapper.innerHTML = createTagHTML(currentPrintItem, dateStr);
                printArea.appendChild(tagWrapper);
            }
        }

        function closePreview() {
            document.getElementById('preview-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
